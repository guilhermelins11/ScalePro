<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../Style/entrar.css">
	<link rel="shortcut icon" href="../images/logoBlack.png"type="image/x-icon"/>
</head>
<body>

 <nav class="navbar">
          <div class="logo">
            <a href="index.html">
              <img src="../images/logo.png" alt="logo" />
            </a>
          </div>

  <div class="page">
        <form method="POST" action="/login" class="formLogin">
            <h1>Login</h1>
            <p>Digite os seus dados de acesso no campo abaixo.</p>
            <label for="username">Razão Social / Usuário</label>
            <input type="text" name="username" id="username" placeholder="Digite a razão social ou usuário" autofocus />
            <label for="password">Senha</label>
            <input type="password" name="senha" placeholder="Digite sua senha" />
            <a href="#">Esqueci minha senha</a>
            <input type="submit" value="Acessar" class="btn" id="btnAcessar" />
        </form>
    </div>
<script src="../Scripts/main.js" defer></script>
</body>
</html>
